<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Snake</h1>
      <section class="hud" aria-label="Game info">
        <p>Score: <span id="score">0</span></p>
        <div class="actions">
          <button id="pause-btn" type="button">Pause</button>
          <button id="restart-btn" type="button">Restart</button>
        </div>
      </section>
      <p id="status" class="status">Use Arrow keys or WASD to move.</p>
      <div
        id="game-board"
        class="board"
        role="grid"
        aria-label="Snake game board"
      ></div>
      <section class="controls" aria-label="Touch controls">
        <button data-dir="up" aria-label="Move up">↑</button>
        <div class="controls-row">
          <button data-dir="left" aria-label="Move left">←</button>
          <button data-dir="down" aria-label="Move down">↓</button>
          <button data-dir="right" aria-label="Move right">→</button>
        </div>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
